name: 'Setup go-arch-lint'
description: 'Install go-arch-lint, the Go architecture linter, and add it to PATH'
author: 'Mike Micatka'

branding:
  icon: 'check-square'
  color: 'blue'

inputs:
  version:
    description: >
      Version of go-arch-lint to install (e.g. v1.15.0 or 1.15.0).
      Defaults to v1.15.0.
    required: false
    default: 'v1.15.0'
  checksum:
    description: >
      Expected SHA256 (hex) of the downloaded release archive for the current
      platform. When set, it takes precedence over both the vendored checksum
      and the release's checksums.txt. Useful for pinning a version that isn't
      vendored into this action.
    required: false

outputs:
  version:
    description: 'The resolved version of go-arch-lint that was installed'

runs:
  using: 'node24'
  main: 'dist/index.js'
