name: Release

# Publishes the action when a semantic-version tag (vX.Y.Z) is pushed.
# Verifies the committed dist/ bundle is up to date, then moves the
# floating major-version tag (e.g. v1) to point at the new release so
# consumers can pin `uses: <owner>/setup-go-arch-lint@v1`.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build

      - name: Verify committed dist is up to date
        run: |
          npm run package
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "dist/ is out of date for this tag. Run 'npm run package' and commit before tagging."
            git diff dist/
            exit 1
          fi

      - name: Update major version tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          MAJOR="${TAG%%.*}"   # e.g. v1.2.3 -> v1
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR" "$TAG"
          git push origin -f "refs/tags/$MAJOR"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --generate-notes --title "$TAG"
